name: Release & Deploy
on:
  push:
    tags: ["v*"]
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ip-service
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
        working-directory: .
      - run: bun run ipdb:fetch --verify
      - run: bun run test:coverage
      - run: bun run typecheck
      - name: Deploy to Vercel
        run: bunx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Health check
        working-directory: .
        run: |
          sleep 15
          for i in 1 2 3; do
            response=$(curl -sf "https://echo.nocoo.cloud/api/live") && break
            sleep 10
          done
          echo "$response"
          echo "$response" | jq -e '.status == "ok"'

  weekly-bump:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ip-service
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: sudo apt-get install -y ripgrep
      - run: bun install
        working-directory: .
      - name: Configure git identity
        run: |
          git config user.name "nocoo"
          git config user.email "nocoo@hexly.ai"
      - run: bun run release -- patch --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: "0"
