name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@aec4adc1a817c56790d1698329ef9398a15a754a  # v2026.5
    with:
      ignore-scripts: true
      test-command: "cd packages/ip-service && bun run test:coverage"
      typecheck-command: "cd packages/ip-service && bun run typecheck"
      lint-command: "cd packages/ip-service && bun run lint"
      osv-config: "osv-scanner.toml"
      enable-l2: "true"
      l2-command: "cd packages/ip-service && bun run test:e2e"
    secrets: inherit
